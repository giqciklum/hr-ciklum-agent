steps:
# Paso 1: Descargar los documentos que se usarán para construir el índice.
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: pull-docs
  entrypoint: bash
  args:
    - '-c'
    - |
      mkdir -p docs
      gsutil -m cp -r gs://hr-bot-docs/* docs/

# Paso 2: Construir la imagen multi-etapa. Docker se encarga de todo lo demás.
- name: 'gcr.io/cloud-builders/docker'
  id: docker-build
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/hr-ciklum-agent', '.']

# Paso 3: Empujar la imagen a Google Container Registry.
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/hr-ciklum-agent']

# Paso 4: Desplegar la imagen final a Cloud Run.
- name: 'gcr.io/cloud-builders/gcloud'
  id: run-deploy
  entrypoint: 'gcloud'
  args:
    - 'run'
    - 'deploy'
    - 'hr-ciklum-agent'
    - '--image=gcr.io/$PROJECT_ID/hr-ciklum-agent'
    - '--region=europe-west1'
    - '--platform=managed'
    - '--memory=1Gi'
    - '--allow-unauthenticated'
    - '--set-env-vars=OPENAI_API_BASE=${_OPENAI_API_BASE}'
    - '--set-secrets=OPENAI_API_KEY=hr-bot-openai-key:latest'

substitutions:
  _OPENAI_API_BASE: 'https://genai-gateway.azure-api.net/'
timeout: '1800s'
options:
  logging: CLOUD_LOGGING_ONLY