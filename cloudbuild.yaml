steps:
# Paso 0: Sincronizar documentos desde el bucket a la carpeta docs
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: pull-docs
  entrypoint: bash
  args:
    - '-c'
    - |
      gsutil -m cp -r gs://hr-bot-docs/* docs/

# Paso 1: Construir y etiquetar la imagen de Docker.
# El Dockerfile ahora se encarga de instalar dependencias y crear el índice.
- name: 'gcr.io/cloud-builders/docker'
  id: docker-build
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/hr-ciklum-agent', '.']

# Paso 2: Desplegar la nueva imagen a Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  id: run-deploy
  args:
    - 'run'
    - 'deploy'
    - 'hr-ciklum-agent'
    - '--image=gcr.io/$PROJECT_ID/hr-ciklum-agent'
    - '--region=europe-west1'
    - '--platform=managed'
    - '--memory=1Gi'
    - '--allow-unauthenticated'
    - '--set-env-vars=OPENAI_API_BASE=${_OPENAI_API_BASE}'
    - '--set-secrets=OPENAI_API_KEY=hr-bot-openai-key:latest'

substitutions:
  _OPENAI_API_BASE: 'https://genai-gateway.azure-api.net/'
timeout: '1200s'

options:
  logging: CLOUD_LOGGING_ONLY