# cloudbuild.yaml (Versión Definitiva - CI/CD Completa para App y Conocimiento)
steps:
# ==============================================================================
# === FASE 1: GESTIÓN DEL CONOCIMIENTO (Actualiza la Base de Datos Vectorial) ===
# ==============================================================================

# Paso 1: Descargar los documentos fuente desde Google Cloud Storage (GCS).
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: pull-docs
  entrypoint: bash
  args:
    - '-c'
    - |
      echo ">> Descargando documentos fuente desde gs://${_GCS_BUCKET_NAME}/..."
      mkdir -p docs
      gsutil -m cp -r gs://${_GCS_BUCKET_NAME}/* docs/

# Paso 2: Instalar las dependencias de Python para la indexación.
- name: 'python:3.11-slim'
  id: install-dependencies
  entrypoint: 'pip'
  args: ['install', '-r', 'requirements.txt', '--user']
  waitFor: ['pull-docs']

# Paso 3: Ejecutar el script para crear una nueva base de datos vectorial.
# Usará el modelo 'text-embedding-3-small' para ser rápida y ligera.
- name: 'python:3.11-slim'
  id: build-vector-index
  entrypoint: 'python'
  args: ['build_index.py']
  waitFor: ['install-dependencies']

# Paso 4: Subir la base de datos vectorial recién creada a GCS.
# Esta será la base de datos que la aplicación descargará al arrancar.
- name: 'gcr.io/cloud-builders/gsutil'
  id: upload-db-to-gcs
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      echo ">> Subiendo nueva base de datos vectorial a gs://${_GCS_BUCKET_NAME}/chroma_db_v2/..."
      gsutil -m cp -r chroma_db_v2 gs://${_GCS_BUCKET_NAME}/

  waitFor: ['build-vector-index']


# ==============================================================================
# === FASE 2: GESTIÓN DE LA APLICACIÓN (Construye y Despliega el Chatbot)   ===
# ==============================================================================

# Paso 5: Construir la imagen de la aplicación con Docker.
- name: 'gcr.io/cloud-builders/docker'
  id: docker-build
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/hr-ciklum-agent', '.']

# Paso 6: Subir la imagen construida a Google Container Registry (GCR).
- name: 'gcr.io/cloud-builders/docker'
  id: docker-push
  args: ['push', 'gcr.io/$PROJECT_ID/hr-ciklum-agent']
  waitFor: ['docker-build']

# Paso 7: Desplegar la nueva versión en Cloud Run con la configuración óptima.
- name: 'gcr.io/cloud-builders/gcloud'
  id: run-deploy
  entrypoint: 'gcloud'
  args:
    - 'run'
    - 'deploy'
    - 'hr-ciklum-agent'
    - '--image=gcr.io/$PROJECT_ID/hr-ciklum-agent'
    - '--region=europe-west1'
    - '--platform=managed'
    - '--memory=2Gi'
    - '--allow-unauthenticated'
    # --- Variables de Entorno Clave para la Aplicación ---
    - '--set-env-vars=OPENAI_API_BASE=${_OPENAI_API_BASE},GCS_BUCKET_NAME=${_GCS_BUCKET_NAME},PERSIST_DIRECTORY=chroma_db_v2,GCP_PROJECT_ID=$PROJECT_ID'
    # --- Montaje de Secretos ---
    - '--set-secrets=OPENAI_API_KEY=hr-bot-openai-key:latest'
    # --- Configuración de Rendimiento para Eliminar "Cold Start" ---
    - '--min-instances=1'
  waitFor: ['docker-push', 'upload-db-to-gcs']

# --- Variables de Sustitución para la Pipeline ---
substitutions:
  _OPENAI_API_BASE: 'https://genai-gateway.azure-api.net/'
  _GCS_BUCKET_NAME: 'hr-bot-docs' # Tu bucket que contiene los documentos y la DB vectorial

# Timeout generoso para el proceso completo
timeout: '1800s'
options:
  logging: CLOUD_LOGGING_ONLY