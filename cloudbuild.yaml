steps:
# Paso 0: Sincronizar documentos desde el bucket
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: pull-docs
  entrypoint: bash
  args:
    - '-c'
    - |
      gsutil -m rsync -r gs://hr-bot-docs docs

# Paso 1: Construir el índice vectorial
- name: 'python:3.11-slim'
  id: build-index
  entrypoint: bash
  args: [ "-c", "pip install -r requirements.txt && python build_index.py" ]

# --- PASO DE DEPURACIÓN ---
# Este paso nos mostrará todos los ficheros para ver si chroma_db existe
- name: 'ubuntu'
  id: debug-list-files
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      echo "--- Listando ficheros en el espacio de trabajo antes de construir Docker ---"
      ls -laR
      echo "---------------------------------------------------------------------"
# -------------------------

# Paso 2: Construir la imagen de Docker
- name: 'gcr.io/cloud-builders/docker'
  id: docker-build
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/hr-ciklum-agent', '.']

# Paso 3: Desplegar la nueva imagen a Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  id: run-deploy
  args:
    - 'run'
    - 'deploy'
    - 'hr-ciklum-agent'
    - '--image=gcr.io/$PROJECT_ID/hr-ciklum-agent'
    - '--region=europe-west1'
    - '--platform=managed'
    - '--memory=1Gi'
    - '--allow-unauthenticated'
    - '--set-env-vars=OPENAI_API_BASE=${_OPENAI_API_BASE}'
    - '--set-secrets=OPENAI_API_KEY=hr-bot-openai-key:latest'

substitutions:
  _OPENAI_API_BASE: 'https://genai-gateway.azure-api.net/'
timeout: '1200s'

options:
  logging: CLOUD_LOGGING_ONLY