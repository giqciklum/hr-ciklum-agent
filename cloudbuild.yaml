# cloudbuild.yaml (Versión Definitiva y Corregida - v3)
steps:
# Paso 1: Descargar SOLO los documentos fuente, excluyendo la base de datos antigua.
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: pull-docs
  entrypoint: bash
  args:
    - '-c'
    - |
      echo ">> Descargando documentos fuente desde gs://${_GCS_BUCKET_NAME}/ (excluyendo directorios de DB)..."
      mkdir -p docs
      # --- LÍNEA CORREGIDA ---
      # El flag -x excluye cualquier ruta que contenga 'chroma_db_v2/'
      gsutil -m cp -r -x ".*chroma_db_v2/.*" gs://${_GCS_BUCKET_NAME}/* docs/

# Paso 2: Instalar las dependencias.
- name: 'python:3.11-slim'
  id: install-dependencies
  entrypoint: 'pip'
  args: ['install', '-r', 'requirements.txt', '--user']
  waitFor: ['pull-docs']

# Paso 3: Ejecutar build_index.py para crear una nueva base de datos ligera.
- name: 'python:3.11-slim'
  id: build-vector-index
  entrypoint: 'python'
  args: ['build_index.py']
  waitFor: ['install-dependencies']

# Paso 4: Subir la nueva base de datos a GCS.
- name: 'gcr.io/cloud-builders/gsutil'
  id: upload-db-to-gcs
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      echo ">> Subiendo nueva base de datos vectorial a gs://${_GCS_BUCKET_NAME}/chroma_db_v2/..."
      gsutil -m cp -r chroma_db_v2 gs://${_GCS_BUCKET_NAME}/
  waitFor: ['build-vector-index']

# Paso 5: Construir la imagen de la aplicación Docker.
- name: 'gcr.io/cloud-builders/docker'
  id: docker-build
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/hr-ciklum-agent', '.']

# Paso 6: Subir la imagen construida.
- name: 'gcr.io/cloud-builders/docker'
  id: docker-push
  args: ['push', 'gcr.io/$PROJECT_ID/hr-ciklum-agent']
  waitFor: ['docker-build']

# Paso 7: Desplegar la nueva revisión en Cloud Run.
- name: 'gcr.io/cloud-builders/gcloud'
  id: run-deploy
  entrypoint: 'gcloud'
  args:
    - 'run'
    - 'deploy'
    - 'hr-ciklum-agent'
    - '--image=gcr.io/$PROJECT_ID/hr-ciklum-agent'
    - '--region=europe-west1'
    - '--platform=managed'
    - '--memory=2Gi'
    - '--allow-unauthenticated'
    - '--set-env-vars=OPENAI_API_BASE=${_OPENAI_API_BASE},GCS_BUCKET_NAME=${_GCS_BUCKET_NAME},PERSIST_DIRECTORY=chroma_db_v2,GCP_PROJECT_ID=$PROJECT_ID'
    - '--set-secrets=OPENAI_API_KEY=hr-bot-openai-key:latest'
    - '--min-instances=1'
  waitFor: ['docker-push', 'upload-db-to-gcs']

# --- Variables de Sustitución ---
substitutions:
  _OPENAI_API_BASE: 'https://genai-gateway.azure-api.net/'
  _GCS_BUCKET_NAME: 'hr-bot-docs'

# Timeout generoso para el proceso completo
timeout: '1800s'
options:
  logging: CLOUD_LOGGING_ONLY