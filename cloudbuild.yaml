# cloudbuild.yaml (Migrated to Google Gemini + HuggingFace Embeddings)
steps:
# Step 1: Download source documents from the GCS bucket.
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: pull-docs
  entrypoint: bash
  args:
    - '-c'
    - |
      mkdir -p docs
      gsutil -m cp -r gs://${_GCS_BUCKET_NAME}/* docs/

# Step 2: Install dependencies AND build vector index in same container
- name: 'python:3.11-slim'
  id: build-vector-index
  entrypoint: bash
  args:
    - '-c'
    - |
      pip install torch --index-url https://download.pytorch.org/whl/cpu
      pip install -r requirements.txt
      python build_index.py
  secretEnv: ['GOOGLE_API_KEY']
  waitFor: ['pull-docs']

# Step 3: Synchronize the new database with GCS.
- name: 'gcr.io/cloud-builders/gsutil'
  id: upload-db-to-gcs
  args:
    - '-m'
    - 'rsync'
    - '-d'
    - '-r'
    - 'chroma_db_v2'
    - 'gs://${_GCS_DB_BUCKET_NAME}/chroma_db_v2'
  waitFor: ['build-vector-index']

# Step 4: Build the application's Docker image.
- name: 'gcr.io/cloud-builders/docker'
  id: docker-build
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/hr-ciklum-agent', '.']

  waitFor: ['build-vector-index']
# Step 5: Push the Docker image to Google Container Registry.
- name: 'gcr.io/cloud-builders/docker'
  id: docker-push
  args: ['push', 'gcr.io/$PROJECT_ID/hr-ciklum-agent']
  waitFor: ['docker-build']

# Step 6: Deploy the new revision to Cloud Run.
- name: 'gcr.io/cloud-builders/gcloud'
  id: run-deploy
  entrypoint: 'gcloud'
  args:
    - 'run'
    - 'deploy'
    - 'hr-ciklum-agent'
    - '--image=gcr.io/$PROJECT_ID/hr-ciklum-agent'
    - '--region=europe-west1'
    - '--platform=managed'
    - '--memory=2Gi'
    - '--allow-unauthenticated'
    - '--min-instances=0'
    - '--cpu-boost'
    - '--set-env-vars=PERSIST_DIRECTORY=chroma_db_v2'
    - '--set-secrets=GOOGLE_API_KEY=hr-bot-gemini-key:latest'
  waitFor: ['docker-push', 'upload-db-to-gcs']

# Substitutions
substitutions:
  _GCS_BUCKET_NAME: 'hr-bot-docs'
  _GCS_DB_BUCKET_NAME: 'hr-bot-db'

# Gemini API key for index building
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/hr-bot-gemini-key/versions/latest
      env: 'GOOGLE_API_KEY'

timeout: '2400s'
options:
  logging: CLOUD_LOGGING_ONLY
